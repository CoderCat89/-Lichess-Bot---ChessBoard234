name: ChessBoard234 Bot

on:
  schedule:
    - cron: '0 */6 * * *'   
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360     

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install berserk chess requests python-chess

      - name: Download and install Stockfish
        shell: bash
        run: |
          mkdir -p $HOME/bin
          sudo apt-get update -qq
          sudo apt-get install -y stockfish 2>&1 | tail -1
          sudo cp /usr/games/stockfish $HOME/bin/stockfish 2>/dev/null || sudo cp /usr/bin/stockfish $HOME/bin/stockfish 2>/dev/null || echo "⚠️ Stockfish not found"
          sudo chmod +x $HOME/bin/stockfish 2>/dev/null || echo "⚠️ Chmod failed"
          echo "✅ Stockfish setup attempted"

      - name: Download and install Fairy-Stockfish
        shell: bash
        run: |
          mkdir -p $HOME/bin
          BIN_URL="https://github.com/fairy-stockfish/Fairy-Stockfish/releases/latest/download/fairy-stockfish-largeboard_x86-64"
          echo "Downloading Fairy-Stockfish..."
          wget -q "$BIN_URL" -O $HOME/bin/fairy-stockfish 2>&1 || curl -sL "$BIN_URL" -o $HOME/bin/fairy-stockfish
          if [ -f $HOME/bin/fairy-stockfish ]; then
            chmod +x $HOME/bin/fairy-stockfish
            echo "✅ Fairy-Stockfish installed"
          else
            echo "⚠️ Fairy-Stockfish download failed, continuing anyway"
          fi

      - name: Run the bot
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
          SEEK_TOKEN: ${{ secrets.SEEK_TOKEN }}
        run: |
          set +e
          python bot.py &
          BOT_PID=$!
          sleep 21580
          kill $BOT_PID 2>/dev/null || true
          echo "✅ Bot session completed"
