name: ChessBoard234 Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 359     # 5h 59m, so only ~1 min gap between runs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install berserk chess requests python-chess

      - name: Download and install Fairy‑Stockfish
        run: |
          wget https://github.com/ianfab/Fairy-Stockfish/releases/latest/download/fairy-stockfish-linux-x86-64.tar
          tar -xf fairy-stockfish-linux-x86-64.tar
          mkdir -p $HOME/bin
          mv fairy-stockfish $HOME/bin/fairy-stockfish
          chmod +x $HOME/bin/fairy-stockfish
          rm fairy-stockfish-linux-x86-64.tar

      - name: Run the bot
        env:
          LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_BOT_TOKEN }}
          SEEK_TOKEN: ${{ secrets.SEEK_TOKEN }}
        run: python bot.py
