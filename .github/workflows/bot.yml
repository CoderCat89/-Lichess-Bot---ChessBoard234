name: ChessBoard234 Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 359     # 5h 59m, so only ~1 min gap between runs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install berserk chess requests python-chess

      - name: Download and install Fairy‑Stockfish
        run: |
          # Download the latest release
          wget -q https://github.com/fairy-stockfish/Fairy-Stockfish/releases/latest/download/fairy-stockfish-linux-x86_64.tar -O fairy.tar || \
          wget -q https://github.com/fairy-stockfish/Fairy-Stockfish/releases/latest/download/fairy-stockfish-linux-x86-64.tar -O fairy.tar || \
          wget -q https://github.com/fairy-stockfish/Fairy-Stockfish/releases/latest/download/fairy-stockfish-linux-x86-64-modern.tar -O fairy.tar || \
          echo "No tar found"

          if [ -f fairy.tar ]; then
            tar -xf fairy.tar
            # Find the largest executable file that contains "fairy" (ignore .tar)
            BINARIO=$(find . -type f -executable -name "*fairy*" ! -name "*.tar" -print0 | xargs -0 ls -1S 2>/dev/null | head -1)
            if [ -z "$BINARIO" ]; then
              # If no executable found, take the largest regular file
              BINARIO=$(find . -type f -name "*fairy*" ! -name "*.tar" -print0 | xargs -0 ls -1S 2>/dev/null | head -1)
            fi
            if [ -n "$BINARIO" ]; then
              mkdir -p $HOME/bin
              cp "$BINARIO" $HOME/bin/fairy-stockfish
              chmod +x $HOME/bin/fairy-stockfish
              echo "Fairy-Stockfish installed from $BINARIO"
            else
              echo "Could not find fairy binary inside the tar"
              exit 1
            fi
            rm fairy.tar
          else
            echo "Fairy-Stockfish download failed. Continuing without it."
          fi

      - name: Run the bot
        env:
          LICHESS_BOT_TOKEN: ${{ secrets.LICHESS_BOT_TOKEN }}
          SEEK_TOKEN: ${{ secrets.SEEK_TOKEN }}
        run: python bot.py
