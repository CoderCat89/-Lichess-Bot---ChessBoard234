name: ChessBoard234 Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 359     # 5h 59m

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install berserk chess requests python-chess

      - name: Download and install Fairy‑Stockfish
        shell: bash
        run: |
          mkdir -p $HOME/bin
          # ✅ El binario ya no viene en .tar, es directo
          BIN_URL="https://github.com/fairy-stockfish/Fairy-Stockfish/releases/latest/download/fairy-stockfish-largeboard_x86-64"
          echo "Downloading Fairy‑Stockfish from $BIN_URL"
          wget -q "$BIN_URL" -O fairy-stockfish
          if [ ! -f fairy-stockfish ]; then
            echo "❌ Failed to download Fairy‑Stockfish"
            exit 1
          fi
          if ! file fairy-stockfish | grep -q "ELF"; then
            echo "❌ Downloaded file is not a valid Linux executable"
            exit 1
          fi
          cp fairy-stockfish $HOME/bin/fairy-stockfish
          chmod +x $HOME/bin/fairy-stockfish
          echo "✅ Fairy‑Stockfish installed successfully"

      - name: Run the bot
        env:
          LICHESS_TOKEN: ${{ secrets.LICHESS_TOKEN }}
          SEEK_TOKEN: ${{ secrets.SEEK_TOKEN }}
        run: python bot.py
